name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: test
        run: go test ./... -short
      - name: build
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in darwin/arm64 darwin/amd64 linux/arm64 linux/amd64; do
            GOOS="${target%/*}" GOARCH="${target#*/}" CGO_ENABLED=0 \
              go build -trimpath \
                -ldflags "-s -w -X github.com/agarichan/dx/internal/cli.version=${GITHUB_REF_NAME#v}" \
                -o "dist/dx-${target%/*}-${target#*/}" ./cmd/dx
          done
          (cd dist && shasum -a 256 dx-* > SHA256SUMS)
      - name: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
